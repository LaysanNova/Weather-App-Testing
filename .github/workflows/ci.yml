name: CI - Playwright Tests
on:
  pull_request:
    branches:
      - main
jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ENV: dev
      BASE_URL: ${{ secrets.BASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Lint and format check
        run: |
          npm run lint
          npm run format:check

      - name: Run Playwright tests
        run: npm test

      # -----------------------------
      # Allure report generation
      # -----------------------------
      - name: Copy previous Allure history
        if: always()
        run: |
          mkdir -p allure-results/history
          if [ -d allure-history ]; then
            cp -r allure-history/* allure-results/history/
          fi
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        run: npm run allure:report

      - name: Save Allure history
        if: always()
        run: |
          rm -rf allure-history
          mkdir -p allure-history
          cp -r allure-report/history/* allure-history/ || true

      # -----------------------------
      # Upload artifacts
      # -----------------------------
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Attach test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Test Artifacts
          path: test-results/

      # -----------------------------
      # Deploy to GitHub Pages (optional)
      # -----------------------------
      - name: Deploy report to Github Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: gh-pages
          PUBLISH_DIR: allure-report