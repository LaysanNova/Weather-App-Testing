name: Playwright Tests CI
permissions:
  contents: write
on:
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ENV: dev
      BASE_URL: ${{ secrets.BASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run tests
        run: npx playwright test

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Copy Allure history
        if: always()
        run: |
          if [ -d gh-pages/allure-history/history ]; then
            mkdir -p reports/allure-report/history
            cp -r gh-pages/allure-history/history reports/allure-report/
          fi

      - name: Generate Allure Report
        if: always()
        run: |
          allure generate reports/allure-report \
            --clean \
            -o allure-history

      - name: Publish report on Github Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.PROJECT_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
